<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do. - Your Daily Task Tracker</title>
  <meta name="description" content="Do. - A sleek, modern daily task tracker to organize and manage your To-Do list with real-time statistics and filtering." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">

    <!-- Header -->
    <header class="header">
      <h1>Do<span>.</span></h1>
      <p class="subtitle">Your daily task tracker</p>
    </header>

    <!-- Input Row -->
    <div class="input-row">
      <input type="text" id="new-task" placeholder="What needs to be done?" />
      <button id="add-btn">+ Add</button>
    </div>

    <!-- Filter Buttons -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="stats-bar" style="display:none;">
      <div class="stat">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num accent" id="stat-active">0</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
    </div>

    <!-- Todo List -->
    <div class="todo-list" id="todo-list"></div>

    <!-- Bottom Bar -->
    <footer class="bottom-bar" id="bottom-bar" style="display:none;">
      <span id="count-label"></span>
      <button class="clear-btn" id="clear-btn">Clear completed</button>
    </footer>

  </main>

  <script src="app.js"></script>
</body>
</html>
